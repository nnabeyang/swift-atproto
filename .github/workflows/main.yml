name: Swift Package Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test-apple-platforms:
    name: Test on Apple Platforms (Xcode 26.4)
    runs-on: macOS-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.1.app
    strategy:
      matrix:
        target: [iOS, macOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Test platform ${{ matrix.destination }}
        run: |
          if [ "${{ matrix.target }}" = "iOS" ]; then
            DESTINATION="platform=iOS Simulator,name=iPhone 17e,OS=26.4.1"
          else
            DESTINATION="platform=macOS"
          fi

          echo "Using destination: $DESTINATION"
          xcodebuild clean test \
            -scheme SwiftAtproto-Package \
            -destination "$DESTINATION" \
            | xcpretty

  test-linux:
    name: Test on Linux (Swift ${{ matrix.swift_version }})
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container_image }}
    strategy:
      matrix:
        include:
          - swift_version: "6.1"
            container_image: "swift:6.1-noble"
          - swift_version: "6.3.2"
            container_image: "swift:6.3.2-noble"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run SwiftPM tests
        run: swift test
